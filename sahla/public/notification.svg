<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2436" />
      <stop offset="50%" stop-color="#111823" />
      <stop offset="100%" stop-color="#070a10" />
    </linearGradient>
    
    <radialGradient id="bgBevel" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#2d3d5a" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <filter id="shadowApp" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.65" />
    </filter>
    
    <filter id="shadowS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="15" stdDeviation="12" flood-color="#05070b" flood-opacity="0.7" />
    </filter>
    
    <filter id="shadowBell" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="superGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="16" result="blur1" />
      <feGaussianBlur stdDeviation="32" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="sGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    
    <linearGradient id="sHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <radialGradient id="glassBody" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="35%" stop-color="#e2e8f0" stop-opacity="0.25" />
      <stop offset="70%" stop-color="#94a3b8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.35" />
    </radialGradient>

    <linearGradient id="glassRim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.5" />
    </linearGradient>

    <linearGradient id="clapperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="40%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <radialGradient id="badgeBody" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a7f3d0" />
      <stop offset="30%" stop-color="#34d399" />
      <stop offset="75%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </radialGradient>
  </defs>

  <g filter="url(#shadowApp)">
    <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
    <rect width="512" height="512" rx="120" fill="url(#bgBevel)" />
    <rect width="506" height="506" x="3" y="3" rx="117" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.12" />
  </g>

  <g filter="url(#shadowS)" transform="translate(15, -5)">
    <path d="M 210,135 
             C 140,135 115,170 115,205 
             C 115,245 155,255 210,270 
             C 275,288 315,305 315,365 
             C 315,425 265,455 190,455 
             C 125,455 100,420 100,395" 
          fill="none" 
          stroke="#0f172a" 
          stroke-width="64" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.3"
          transform="translate(0, 5)" />
          
    <path d="M 210,135 
             C 140,135 115,170 115,205 
             C 115,245 155,255 210,270 
             C 275,288 315,305 315,365 
             C 315,425 265,455 190,455 
             C 125,455 100,420 100,395" 
          fill="none" 
          stroke="url(#sGrad)" 
          stroke-width="58" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <path d="M 210,135 
             C 140,135 115,170 115,205 
             C 115,245 155,255 210,270 
             C 275,288 315,305 315,365 
             C 315,425 265,455 190,455" 
          fill="none" 
          stroke="url(#sHighlight)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          transform="translate(-2, -3)"
          opacity="0.9" />
  </g>

  <g transform="translate(0, 12)">
    <path d="M 205,365 C 205,425 307,425 307,365" fill="none" stroke="#10b981" stroke-width="32" stroke-linecap="round" filter="url(#superGlow)" opacity="0.4" />
    <path d="M 205,365 C 205,425 307,425 307,365" fill="none" stroke="url(#clapperGrad)" stroke-width="32" stroke-linecap="round" />
    <path d="M 209,365 C 209,417 303,417 303,365" fill="none" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round" opacity="0.6" />
    <path d="M 225,402 C 240,412 272,412 287,402" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  </g>

  <g filter="url(#shadowBell)">
    <path d="M 256,115 
             C 185,115 175,205 175,290 
             C 175,325 135,335 135,355
             C 135,362 170,368 256,368
             C 342,368 377,362 377,355
             C 377,335 337,325 337,290
             C 337,205 327,115 256,115 Z" 
          fill="#111823" opacity="0.4" />

    <path d="M 256,115 
             C 185,115 175,205 175,290 
             C 175,325 135,335 135,355
             C 135,362 170,368 256,368
             C 342,368 377,362 377,355
             C 377,335 337,325 337,290
             C 337,205 327,115 256,115 Z" 
          fill="url(#glassBody)" 
          stroke="url(#glassRim)" 
          stroke-width="3.5" />

    <path d="M 240,123 
             C 195,130 186,210 186,285
             C 186,310 170,325 152,342" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="5" 
          stroke-linecap="round" 
          opacity="0.65" />

    <path d="M 275,125 
             C 315,135 324,210 324,285" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          opacity="0.25" />

    <path d="M 137,354 C 175,365 215,368 256,368 C 297,368 337,365 375,354" 
          fill="none" 
          stroke="url(#glassRim)" 
          stroke-width="5" 
          stroke-linecap="round" />
          
    <path d="M 145,353 C 180,362 218,364 256,364 C 294,364 332,362 367,353" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          stroke-linecap="round" 
          opacity="0.7" />
  </g>

  <g transform="translate(355, 150)">
    <circle cx="0" cy="0" r="46" fill="#10b981" filter="url(#superGlow)" opacity="0.65" />
    
    <circle cx="2" cy="12" r="32" fill="#05070b" opacity="0.4" filter="url(#superGlow)"/>

    <circle cx="0" cy="0" r="34" fill="url(#badgeBody)" />
    
    <circle cx="0" cy="0" r="32" fill="none" stroke="#a7f3d0" stroke-width="1.5" opacity="0.4" />

    <circle cx="0" cy="0" r="14" fill="#ffffff" />
    <circle cx="0" cy="0" r="14" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5" />
    
    <circle cx="-10" cy="-10" r="5" fill="#ffffff" opacity="0.9" />
    <circle cx="-7" cy="-7" r="2" fill="#ffffff" opacity="0.4" />
  </g>
</svg>
