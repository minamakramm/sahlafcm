<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Optimized Rounded Background -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)" />
  <rect width="64" height="64" rx="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Centered 's.' with High-Fidelity Styling -->
  <g filter="url(#softShadow)">
    <text x="32" y="46" font-family="Poppins, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">
      s<tspan fill="#22C55E" filter="url(#glow)">.</tspan>
    </text>
  </g>
</svg>
