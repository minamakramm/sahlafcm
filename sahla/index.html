  <!-- Anti-flash: set data-theme BEFORE any CSS paints -->
  <script>
    (function(){
      try {
        var stored = JSON.parse(localStorage.getItem('sahla-theme'));
        var theme = stored && stored.state && stored.state.theme;
        var resolved = theme
          ? theme
          : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <style>
    /* Critical inline CSS — theme-aware to prevent flash in either mode */
    html, body { margin: 0; }
    html[data-theme="dark"], html[data-theme="dark"] body { background-color: #0F0E17; color: #F4F4F5; }
    html[data-theme="light"], html[data-theme="light"] body { background-color: #F4F3F0; color: #18181B; }
    #root { min-height: 100vh; }
  </style>
</head>
