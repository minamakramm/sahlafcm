name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint & Prettier check
      run: |
        npm run lint
        # If prettier script exists
        # npm run format:check

    - name: Run Vitest
      run: npm run test -- --run

    - name: Check Build
      run: npm run build
